services:
  # 1. Python Sentiment Analysis Private Service (Deployed as Web Service for Free Tier)
  - type: web
    name: bookstore-sentiment
    env: docker
    dockerfilePath: sentiment-service/Dockerfile
    dockerContext: sentiment-service
    plan: free

  # 2. Python Recommendation NLP Private Service (Deployed as Web Service for Free Tier)
  - type: web
    name: bookstore-recommender
    env: docker
    dockerfilePath: recommender/Dockerfile
    dockerContext: recommender
    plan: free
    envVars:
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: test

  # 3. Express.js Backend Server
  - type: web
    name: bookstore-server
    env: docker
    dockerfilePath: server/Dockerfile
    dockerContext: server
    plan: free
    envVars:
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false # Connect to Upstash / external free Redis
      - key: SENTIMENT_URL
        value: http://bookstore-sentiment:8001
      - key: REC_URL
        value: http://bookstore-recommender:8002
      - key: ELASTICSEARCH_URL
        sync: false # Connect to Bonsai / Elastic Cloud instance
      - key: ELASTICSEARCH_API_KEY
        sync: false # Optional API Key for authentication
      - key: JWT_SECRET
        generateValue: true
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  # 4. React Frontend Client (Static Site for free hosting)
  - type: web
    name: bookstore-client
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: client
    envVars:
      - key: VITE_BASE_URL
        fromService:
          type: web
          name: bookstore-server
          envVarKey: RENDER_EXTERNAL_URL
