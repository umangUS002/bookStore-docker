name: BookStore Docker CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Client Dependencies
        working-directory: ./client
        run: npm ci

      - name: Build Client (Verification)
        working-directory: ./client
        run: npm run build

      - name: Install Server Dependencies
        working-directory: ./server
        run: npm ci

      - name: Run Tests (If any)
        working-directory: ./server
        run: npm test --if-present

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test
    strategy:
      matrix:
        service: [client, server, recommender, sentiment, redis, elasticsearch]
        include:
          - service: client
            context: ./client
            image: bookstore-client
          - service: server
            context: ./server
            image: bookstore-server
          - service: recommender
            context: ./recommender
            image: bookstore-recommender
          - service: sentiment
            context: ./sentiment-service
            image: bookstore-sentiment
          - service: redis
            base_image: redis:7
            image: bookstore-redis
            is_infra: true
          - service: elasticsearch
            base_image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
            image: bookstore-elasticsearch
            is_infra: true

    steps:
      - name: Checkout Code
        if: ${{ !matrix.is_infra }}
        uses: actions/checkout@v6

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Custom Docker Image
        if: ${{ !matrix.is_infra }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:latest

      - name: Pull, Tag, and Push Infrastructure Image
        if: ${{ matrix.is_infra }}
        run: |
          docker pull ${{ matrix.base_image }}
          docker tag ${{ matrix.base_image }} ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:latest
